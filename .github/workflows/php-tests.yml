name: PHP Tests
on: [push, pull_request, workflow_dispatch]

jobs:
  php-tests:
    uses: lunr-php/actions-templates/.github/workflows/php-library.yml@74ee0b4e3ec264a6def4a4b2296f84f36aa26107 # 0.14.1
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      coding-standard: 'Lunr'
      minimum-php-version: '8.3'
      php-extensions: uopz, uuid
      stable-php-versions: '["8.3"]'
      experimental-php-versions: '["8.4","8.5"]'
